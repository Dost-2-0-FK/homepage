{% extends "layout.html" %}

{% block body %}
<div class="row g-3">
  <div class="col-12">
    <div class="d-flex flex-wrap gap-2 align-items-center justify-content-between mb-3">
      <div>
        <h2 class="mb-1">Secret File Graph</h2>
        <a href="/secret/{{user.key}}/reviews">list view</a>
      </div>
      <div class="d-flex gap-2">
        <button id="fit-btn" type="button" class="btn btn-sm graph-btn">Fit graph</button>
        <button id="toggle-physics-btn" type="button" class="btn btn-sm graph-btn">Toggle physics</button>
      </div>
    </div>
  </div>

  <div class="col-12">
    <div class="card shadow-sm">
      <div class="card-body p-2 p-md-3">
        <div id="secret-file-graph"></div>
      </div>
    </div>
  </div>
</div>

<style>
  :root {
    --bg-color: #0d0d0d;
    --primary-color: #6a5e2b;
    --primary-hover: #85763a;
    --secondary-color: #0e3d37;
    --secondary-hover: #14524a;
    --text-color: #e5e5e5;
    --muted-text: #b9b9b9;
    --font-family: "Fira Code", Consolas, "Courier New", Courier, monospace;
  }

  #secret-file-graph {
    width: 100%;
    height: 75vh;
    min-height: 520px;
    border: 1px solid var(--primary-color);
    border-radius: 0.5rem;
    background: var(--bg-color);
  }

  .card {
    background-color: var(--bg-color);
    color: var(--text-color);
    border: 1px solid var(--primary-color);
  }

  .text-muted {
    color: var(--muted-text) !important;
  }

  .graph-btn {
    background-color: transparent;
    border: 1px solid var(--primary-color);
    color: var(--text-color);
    font-family: var(--font-family);
  }

  .graph-btn:hover,
  .graph-btn:focus,
  .graph-btn:active {
    background-color: rgba(14, 61, 55, 0.18);
    border-color: var(--primary-hover);
    color: var(--text-color);
    box-shadow: none;
  }

  .vis-network:focus {
    outline: none;
  }

  .vis-button,
  .vis-button:focus,
  .vis-button:hover {
    background-color: var(--secondary-color) !important;
    border: 1px solid var(--primary-color) !important;
    color: var(--text-color) !important;
    border-radius: 0.375rem !important;
    box-shadow: none !important;
    opacity: 1 !important;
  }

  .vis-navigation .vis-button::before,
  .vis-button::before {
    color: var(--text-color) !important;
  }

  .vis-navigation {
    top: 12px !important;
    right: 12px !important;
  }
</style>

<script src="https://cdn.jsdelivr.net/npm/vis-network@9.1.9/dist/vis-network.min.js"></script>
<link
  href="https://cdn.jsdelivr.net/npm/vis-network@9.1.9/dist/dist/vis-network.min.css"
  rel="stylesheet"
  type="text/css"
/>

<script>
  (function () {
    const rawEntries = {{ entries | tojson }};

    const entriesByKey = new Map(rawEntries.map(entry => [entry.key, entry]));

    const nodes = rawEntries.map(entry => {
      const surname = entry.sirname || entry.surname || "";
      const name = entry.name || "";
      const zone = entry.zone || "-";

      // newline between name and zone
      const label = `${surname}, ${name}\n[zone: ${zone}]`;

      return {
        id: entry.key,
        label,
        shape: "box",
        margin: 10,
        font: {
          face: "Fira Code, Consolas, Courier New, monospace",
          size: 16,
          color: "#e5e5e5",
          multi: true,
          strokeWidth: 0
        }
      };
    });

    const edgeSet = new Set();
    const edges = [];

    rawEntries.forEach(entry => {
      const sourceKey = entry.key;
      const connections = Array.isArray(entry.connections) ? entry.connections : [];

      connections.forEach(targetKey => {
        if (!entriesByKey.has(targetKey) || sourceKey === targetKey) {
          return;
        }

        const edgeId = [sourceKey, targetKey].sort().join("::");
        if (edgeSet.has(edgeId)) {
          return;
        }

        edgeSet.add(edgeId);
        edges.push({
          from: sourceKey,
          to: targetKey,
          color: { color: "#6a5e2b", highlight: "#8a7a36" },
          width: 1.5
        });
      });
    });

    const container = document.getElementById("secret-file-graph");
    const data = {
      nodes: new vis.DataSet(nodes),
      edges: new vis.DataSet(edges)
    };

    const options = {
      autoResize: true,
      physics: {
        enabled: true,
        stabilization: { iterations: 200 },
        barnesHut: {
          gravitationalConstant: -7000,
          centralGravity: 0.2,
          springLength: 160,
          springConstant: 0.04,
          damping: 0.12,
          avoidOverlap: 0.3
        }
      },
      interaction: {
        hover: true,
        navigationButtons: true,
        keyboard: true,
        zoomView: true,
        dragView: true
      },
      nodes: {
        borderWidth: 1,
        borderWidthSelected: 2,
        color: {
          border: "#6a5e2b",
          background: "#0e3d37",
          highlight: {
            border: "#8a7a36",
            background: "#14524a"
          }
        },
        shadow: true,
        widthConstraint: {
          maximum: 260
        }
      },
      edges: {
        smooth: {
          type: "dynamic"
        },
        shadow: false
      },
      layout: {
        improvedLayout: true
      }
    };

    const network = new vis.Network(container, data, options);

    network.on("click", function (params) {
      if (!params.nodes || params.nodes.length === 0) {
        return;
      }

      const connection = params.nodes[0];
      window.location.href = `/secret/{{ user.key }}/reviews#entry_${connection}`;
    });

    // try to improve perceived sharpness after layout settles / resize
    function redrawForSharpness() {
      network.redraw();
      network.fit({ animation: false });
    }

    window.addEventListener("resize", function () {
      network.redraw();
    });

    document.getElementById("fit-btn")?.addEventListener("click", function () {
      network.fit({ animation: true });
    });

    document.getElementById("toggle-physics-btn")?.addEventListener("click", function () {
      const current = network.physics.physicsEnabled;
      network.setOptions({ physics: { enabled: !current } });
    });

    network.once("stabilizationIterationsDone", function () {
      network.fit({ animation: true });
      setTimeout(redrawForSharpness, 80);
    });
  })();
</script>
{% endblock %}
